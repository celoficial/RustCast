name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build / ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rustcast
            asset_name: rustcast-linux-x86_64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: rustcast
            asset_name: rustcast-linux-aarch64
            use_cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: rustcast
            asset_name: rustcast-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rustcast
            asset_name: rustcast-macos-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rustcast.exe
            asset_name: rustcast-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dlna-server

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --manifest-path dlna-server/Cargo.toml --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cd dlna-server && cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp "dlna-server/target/${{ matrix.target }}/release/${{ matrix.artifact }}" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
